name: Deploy Backend Private to GHCR

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify TypeScript compiles (production code only)
        run: npx tsc --project ./ --noEmit

  build-and-push:
    name: Build and push Docker image
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repo_lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set Image Tag
        id: tags
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "primary=latest" >> $GITHUB_OUTPUT
          else
            echo "primary=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/cursala2026/backend-cursala-private:${{ steps.tags.outputs.primary }}
            ghcr.io/cursala2026/backend-cursala-private:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify pushed manifests
        run: |
          for t in "${{ steps.tags.outputs.primary }}" "${{ github.sha }}"; do
            if ! docker manifest inspect ghcr.io/cursala2026/backend-cursala-private:$t > /dev/null 2>&1; then
              echo "Manifest for $t not found"; exit 1
            fi
          done
